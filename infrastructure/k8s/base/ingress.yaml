apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: localedge-ingress
  namespace: localedge
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - app.localedge.in
        - api.localedge.in
        - admin.localedge.in
      secretName: localedge-tls
  rules:
    - host: app.localedge.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: localedge-web
                port:
                  number: 80
    - host: api.localedge.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: localedge-api
                port:
                  number: 80
    - host: admin.localedge.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: localedge-admin
                port:
                  number: 80
