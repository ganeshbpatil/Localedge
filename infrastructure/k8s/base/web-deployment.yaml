apiVersion: apps/v1
kind: Deployment
metadata:
  name: localedge-web
  namespace: localedge
  labels:
    app: localedge-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: localedge-web
  template:
    metadata:
      labels:
        app: localedge-web
    spec:
      containers:
        - name: web
          image: localedge/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.localedge.in"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
