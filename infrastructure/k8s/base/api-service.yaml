apiVersion: v1
kind: Service
metadata:
  name: localedge-api
  namespace: localedge
spec:
  selector:
    app: localedge-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: localedge-api-hpa
  namespace: localedge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: localedge-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
